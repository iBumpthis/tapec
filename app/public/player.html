<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TapeC Player</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="player-nav">
    <button id="backBtn">Back to Library</button>
    <button id="browseBtn">Browse Library</button>
  </div>
  <div class="markers-topbar">
    <div class="markers-topbar-left"><!-- spacer --></div>
    <div class="markers-header" id="markersHeader">
      <h3>Track Markers</h3>
      <button class="markers-toggle" id="markersToggle">collapse</button>
    </div>
  </div>

  <!-- Browse overlay -->
  <div id="browseOverlay" class="browse-overlay hidden">
    <div class="browse-panel">
      <div class="browse-header">
        <span class="browse-title">Browse Library</span>
        <button id="browseClose">&#10005;</button>
      </div>
      <div class="browse-controls">
        <select id="browseLib"></select>
        <input id="browseQ" placeholder="Search..." />
      </div>
      <div id="browseList" class="browse-list"></div>
    </div>
    <div class="browse-backdrop" id="browseBackdrop"></div>
  </div>

  <div class="panel">
    <!-- LEFT: player + editing -->
    <div>
      <!-- Playback frame: video + canvas + custom controls -->
      <div class="playback-frame" id="playbackFrame">
        <video id="player" playsinline></video>
        <canvas id="vizCanvas"></canvas>

        <!-- Custom control bar — all modes -->
        <div class="custom-controls" id="customControls">
          <button class="cc-btn cc-play" id="ccPlay" title="Play/Pause">
            <svg id="ccPlayIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="6,4 20,12 6,20"/>
            </svg>
            <svg id="ccPauseIcon" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <rect x="5" y="4" width="4" height="16"/>
              <rect x="15" y="4" width="4" height="16"/>
            </svg>
          </button>
          <span class="cc-time" id="ccTimeCurrent">0:00</span>
          <input type="range" class="cc-seek" id="ccSeek" min="0" max="100" step="0.1" value="0" />
          <span class="cc-time" id="ccTimeDuration">0:00</span>
          <input type="range" class="cc-volume" id="ccVolume" min="0" max="1" step="0.01" value="1" title="Volume" />
          <button class="cc-btn cc-fullscreen" id="ccFullscreen" title="Fullscreen">
            <svg id="ccFsEnter" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15,3 21,3 21,9"/>
              <polyline points="9,21 3,21 3,15"/>
              <polyline points="21,3 14,10"/>
              <polyline points="3,21 10,14"/>
            </svg>
            <svg id="ccFsExit" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="4,14 10,14 10,20"/>
              <polyline points="20,10 14,10 14,4"/>
              <polyline points="14,10 21,3"/>
              <polyline points="10,14 3,21"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Now playing strip -->
      <div class="now-playing-strip hidden" id="nowPlayingStrip">
        <div class="np-pill np-adjacent" id="npPrev"></div>
        <div class="np-pill np-current" id="npCurrent"></div>
        <div class="np-pill np-adjacent" id="npNext"></div>
      </div>

      <!-- Playback mode toolbar -->
      <div class="playback-toolbar" id="playbackToolbar">
        <div class="mode-toggles">
          <button class="mode-btn active" id="modeVideo" data-mode="video" title="Video">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <polygon points="10,9 16,12 10,15"/>
            </svg>
          </button>
          <button class="mode-btn" id="modeAudio" data-mode="audio" title="Audio Only">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
          </button>
          <button class="mode-btn" id="modeVisualizer" data-mode="visualizer" title="Visualizer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="10" width="2" height="8" rx="1"/>
              <rect x="8" y="6" width="2" height="12" rx="1"/>
              <rect x="12" y="3" width="2" height="18" rx="1"/>
              <rect x="16" y="8" width="2" height="10" rx="1"/>
              <rect x="20" y="11" width="2" height="6" rx="1"/>
            </svg>
          </button>
        </div>
        <div class="theme-selector hidden" id="themeSelector">
          <button class="theme-btn" data-theme="muted" title="Muted">
            <span class="theme-dot theme-dot-muted"></span>
          </button>
          <button class="theme-btn" data-theme="colorful" title="Colorful">
            <span class="theme-dot theme-dot-colorful"></span>
          </button>
          <button class="theme-btn active" data-theme="rgb" title="RGB">
            <span class="theme-dot theme-dot-rgb"></span>
          </button>
        </div>
        <div class="mode-notice hidden" id="modeNotice"></div>
      </div>

      <!-- Title + breadcrumb, shown below video -->
      <div class="video-meta">
        <h1 id="title">TapeC Player</h1>
        <div class="small" id="sub"></div>
      </div>

      <div class="action-buttons">
        <button class="action-trigger" id="openNotesOverlay">+ Notes</button>
        <button class="action-trigger" id="openImportOverlay">+ Import Tracks</button>
      </div>

      <!-- Notes display (read-only, shown only when notes exist) -->
      <div id="notesDisplay" class="notes-display hidden">
        <div id="notesDisplayContent"></div>
      </div>

      <!-- Notes overlay -->
      <div id="notesOverlay" class="editor-overlay hidden">
        <div class="editor-backdrop" data-close="notesOverlay"></div>
        <div class="editor-modal">
          <div class="editor-modal-header">
            <span class="editor-modal-title">Notes / Description</span>
            <button class="editor-modal-close" data-close="notesOverlay">&#10005;</button>
          </div>
          <div class="editor-modal-body">
            <textarea id="notes" placeholder="Notes..."></textarea>
          </div>
          <div class="editor-modal-footer">
            <span id="saveStatus" class="small"></span>
            <button id="saveBtn">Save</button>
          </div>
        </div>
      </div>

      <!-- Import overlay -->
      <div id="importOverlay" class="editor-overlay hidden">
        <div class="editor-backdrop" data-close="importOverlay"></div>
        <div class="editor-modal">
          <div class="editor-modal-header">
            <span class="editor-modal-title">Import Tracks</span>
            <button class="editor-modal-close" data-close="importOverlay">&#10005;</button>
          </div>
          <div class="editor-modal-body">
            <textarea id="markerText" rows="10" class="mono"
              placeholder="0:00 Intro&#10;01:10 Track name&#10;05:08 Another track"></textarea>
          </div>
          <div class="editor-modal-footer">
            <span id="importStatus" class="small"></span>
            <button id="importMarkersBtn">Import</button>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: markers list -->
    <div id="markersPanel">
      <div id="markers-scroll">
        <div id="markers"></div>
      </div>
    </div>
  </div>

  <script src="/player.js"></script>
  <footer class="app-footer">
    TapeC <span id="app-version">—</span> | <a href="index.html">Home</a> | <a href="history.html">Version History</a>
  </footer>
  <script>
    fetch("/api/health")
      .then(r => r.json())
      .then(d => { document.getElementById("app-version").textContent = d.version ?? ""; })
      .catch(() => {});
  </script>
</body>

</html>
