<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TapeC Player</title>
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="player-nav">
    <button id="backBtn">Back to Library</button>
    <button id="browseBtn">Browse Library</button>
  </div>
  <h1 id="title">TapeC Player</h1>
  <div class="small" id="sub"></div>

  <!-- Browse overlay -->
  <div id="browseOverlay" class="browse-overlay hidden">
    <div class="browse-panel">
      <div class="browse-header">
        <span class="browse-title">Browse Library</span>
        <button id="browseClose">✕</button>
      </div>
      <div class="browse-controls">
        <select id="browseLib"></select>
        <input id="browseQ" placeholder="Search..." />
      </div>
      <div id="browseList" class="browse-list"></div>
    </div>
    <div class="browse-backdrop" id="browseBackdrop"></div>
  </div>

  <div class="panel">
    <!-- LEFT: player + editing -->
    <div>
      <video id="player" controls playsinline></video>

      <div class="row">
        <h3>Notes/Description</h3>
        <textarea id="notes" placeholder="Notes..."></textarea>

        <h3>Paste Tracklist (v0.2)</h3>
        <textarea id="markerText" rows="10" class="mono"
          placeholder="0:00 Intro&#10;01:10 Track name&#10;05:08 Another track"></textarea>

        <div class="row">
          <button id="importMarkersBtn">Import Markers</button>
          <span id="importStatus" class="small"></span>
        </div>

        <div class="row">
          <button id="saveBtn">Save</button>
          <span id="saveStatus" class="small"></span>
        </div>
      </div>
    </div>

    <!-- RIGHT: markers list -->
    <div>
      <h3>Track Markers</h3>
      <div id="markers"></div>
    </div>
  </div>

  <script src="/player.js"></script>
  <footer class="app-footer">
    TapeC <span id="app-version">—</span>
  </footer>
  <script>
    fetch("/api/health")
      .then(r => r.json())
      .then(d => { document.getElementById("app-version").textContent = d.version ?? ""; })
      .catch(() => {});
  </script>
</body>

</html>
