<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TapeC Player</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <a href="/">← Back</a>
  <h1 id="title">TapeC Player</h1>
  <div class="small" id="sub"></div>

  <div class="panel">
    <div>
      <video id="player" controls style="width:100%; max-height:60vh;"></video>

      <h3>Notes</h3>
      <textarea id="notes" placeholder="Notes..."></textarea>

      <h3>Quick import (paste timestamps)</h3>
      <div class="small">Accepted: <code>MM:SS</code> or <code>H:MM:SS</code> followed by a label.</div>
      <textarea id="importBox" placeholder="00:00 Intro&#10;01:35 Track 1 – Artist – Title&#10;06:52 Track 2 – Artist – Title"></textarea>
      <button id="importBtn">Parse → Markers</button>
      <button id="saveBtn">Save meta</button>
      <span class="small" id="saveStatus"></span>
    </div>

    <div>
      <h3>Markers</h3>
      <div id="markers"></div>
    </div>
  </div>

  <script src="/player.js"></script>
</body>
</html>
