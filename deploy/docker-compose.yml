services:
  tapec:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tapec
    restart: unless-stopped
    ports:
      - "32410:32410"
    volumes:
      # Config — bind-mounted so library paths can be edited without rebuild
      - ./config.json:/app/config.json:ro
      # NAS media — read-only, full share mounted so new libraries need no compose change
      - /mnt/nas/media:/media:ro
      # Persistent local data — DB and metadata stay on knope, not on NAS
      - /opt/tapec/data/db:/data/db
      - /opt/tapec/data/metadata:/data/metadata
    environment:
      - TAPEC_DB_PATH=/data/db/tapec.sqlite
      - TAPEC_META_ROOT=/data/metadata
